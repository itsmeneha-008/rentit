<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RentIt – Wishlist</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/responsive.css">
  </head>
  <body>
    <!-- Loading Screen -->
    <div id="loading-screen">
      <div class="spinner-custom mb-3"></div>
      <h5 class="fw-semibold text-secondary-theme">Opening saved folder...</h5>
    </div>

    <!-- Header Navigation -->
    <nav class="navbar navbar-custom">
      <div class="container-fluid max-width-container d-flex justify-content-between align-items-center">
        <a href="home.html" class="logo-brand" id="wish-brand-logo">
          <i class="fa-solid fa-arrows-spin text-primary-theme"></i> Rent<span>It</span>
        </a>
        <div class="d-flex align-items-center gap-2">
          <button class="btn dark-mode-toggle p-2 fs-5" id="wish-mode-btn" aria-label="Toggle mode">
            <i class="fa-solid fa-moon"></i>
          </button>
          <a href="profile.html">
            <img src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?auto=format&fit=crop&w=150&q=80" alt="Profile" class="nav-avatar-img">
          </a>
        </div>
      </div>
    </nav>

    <!-- Main Wrapper -->
    <main class="main-wrapper py-4" id="wishlist-page-container">
      <div class="container">
        <!-- Section Title -->
        <div class="mb-4">
          <h4 class="fw-bold mb-1 font-poppins text-primary-dark">Saved Rentals</h4>
          <p class="text-secondary-theme fs-7 mb-0">Bookings you've bookmarked for later consideration</p>
        </div>

        <!-- Wishlist items deck -->
        <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4" id="wishlist-items-deck">
          <!-- Dynamically populated -->
        </div>
      </div>
    </main>

    <!-- Bottom Navigation Rail -->
    <nav class="bottom-nav">
      <a href="home.html" class="bottom-nav-item" id="bnav-home">
        <i class="fa-solid fa-house"></i>
        <span>Home</span>
      </a>
      <a href="categories.html" class="bottom-nav-item" id="bnav-categories">
        <i class="fa-solid fa-compass"></i>
        <span>Categories</span>
      </a>
      <a href="wishlist.html" class="bottom-nav-item active" id="bnav-wishlist">
        <i class="fa-solid fa-heart"></i>
        <span class="badge-counter d-none wishlist-badge">0</span>
        <span>Wishlist</span>
      </a>
      <a href="profile.html?tab=bookings" class="bottom-nav-item" id="bnav-bookings">
        <i class="fa-solid fa-calendar-check"></i>
        <span class="badge-counter d-none bookings-badge">0</span>
        <span>Bookings</span>
      </a>
      <a href="profile.html" class="bottom-nav-item" id="bnav-profile">
        <i class="fa-solid fa-user"></i>
        <span>Profile</span>
      </a>
    </nav>

    <!-- Bootstrap 5 Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JavaScript Shared Core -->
    <script type="module" src="/js/script.js"></script>

    <!-- Wishlist dynamic rendering engine -->
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const deckContainer = document.getElementById("wishlist-items-deck");

        function drawWishlist() {
          const listIds = getWishlist();
          const products = getProducts();
          const wishlistProducts = products.filter(p => listIds.includes(p.id));

          deckContainer.innerHTML = "";

          if (wishlistProducts.length === 0) {
            deckContainer.innerHTML = `
              <div class="col-12 text-center py-5">
                <i class="fa-regular fa-heart text-secondary-theme fs-1 mb-3"></i>
                <h5 class="fw-semibold text-dark">Your Wishlist is Empty</h5>
                <p class="text-secondary-theme fs-7">Browse our categories and add listings to keep track of them here.</p>
                <a href="home.html" class="btn btn-primary-custom mt-3 px-4">Browse Marketplace</a>
              </div>
            `;
            return;
          }

          wishlistProducts.forEach(p => {
            const cardHtml = `
              <div class="col" id="wish-col-${p.id}">
                <div class="card card-custom p-3 border-0 shadow-sm h-100 d-flex flex-column justify-content-between">
                  <div class="d-flex gap-3 align-items-center mb-3">
                    <img src="${p.image}" class="rounded-3 object-fit-cover shadow-sm" style="width: 80px; height: 80px;" alt="${p.title}">
                    <div class="flex-grow-1 text-truncate">
                      <span class="badge bg-primary-light text-primary-theme fs-8 px-2 py-1 rounded mb-1">${p.category}</span>
                      <h6 class="fw-bold text-dark font-poppins mb-1 text-truncate" style="max-width: 200px;">
                        <a href="product.html?id=${p.id}">${p.title}</a>
                      </h6>
                      <p class="text-secondary-theme fs-8 mb-0"><i class="fa-solid fa-location-dot text-primary-theme me-1"></i> ${p.location.split(",")[0]}</p>
                    </div>
                  </div>
                  
                  <!-- Bottom Pricing details and Action row -->
                  <div class="d-flex justify-content-between align-items-center pt-3 border-top border-light mt-auto">
                    <div>
                      <span class="fw-bold text-primary-theme fs-5">₹${p.price}</span>
                      <span class="fs-8 text-secondary-theme">/ day</span>
                    </div>
                    <div class="d-flex gap-2">
                      <button class="btn btn-outline-danger btn-sm px-2.5 py-1.5 remove-wish-btn rounded-3" data-id="${p.id}" title="Remove from wishlist">
                        <i class="fa-solid fa-trash-can"></i> Remove
                      </button>
                      <a href="booking.html?id=${p.id}" class="btn btn-primary-custom btn-sm py-1.5 px-3 rounded-3 font-poppins fs-8 fw-semibold">
                        Rent Now <i class="fa-solid fa-calendar-arrow-down ms-1"></i>
                      </a>
                    </div>
                  </div>
                </div>
              </div>
            `;
            deckContainer.insertAdjacentHTML("beforeend", cardHtml);
          });

          // Attach delete trigger listeners
          deckContainer.querySelectorAll(".remove-wish-btn").forEach(btn => {
            btn.addEventListener("click", () => {
              const id = btn.getAttribute("data-id");
              toggleWishlist(id); // removes from storage
              drawWishlist(); // redraws dynamically!
            });
          });
        }

        drawWishlist();
      });
    </script>
  </body>
</html>
