<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RentIt – Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/responsive.css">
  </head>
  <body class="bg-light">
    <!-- Loading Screen -->
    <div id="loading-screen">
      <div class="spinner-custom mb-3"></div>
      <h5 class="fw-semibold text-secondary-theme">Authenticating...</h5>
    </div>

    <!-- Main Container -->
    <main class="d-flex align-items-center justify-content-center min-vh-100 py-5">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-md-5 col-lg-4">
            <div class="card card-custom shadow-soft-lg p-4">
              <!-- Logo & Title -->
              <div class="text-center mb-4">
                <a href="index.html" class="logo-brand d-inline-flex mb-2" id="login-brand-logo">
                  <i class="fa-solid fa-arrows-spin text-primary-theme"></i> Rent<span>It</span>
                </a>
                <h4 class="fw-bold text-primary-dark font-poppins">Welcome Back</h4>
                <p class="text-secondary-theme fs-7">Rent premium items on demand</p>
              </div>

              <!-- Login Form -->
              <form id="login-form">
                <!-- Email Field -->
                <div class="mb-3">
                  <label for="login-email" class="form-label fs-7 fw-semibold text-secondary-theme">Email Address</label>
                  <div class="input-group">
                    <span class="input-group-text border-theme bg-white text-secondary-theme" id="email-addon">
                      <i class="fa-regular fa-envelope"></i>
                    </span>
                    <input type="email" id="login-email" class="form-control form-input-custom" placeholder="alex.p@google.com" value="alex.p@google.com" required aria-describedby="email-addon">
                  </div>
                </div>

                <!-- Password Field -->
                <div class="mb-3">
                  <div class="d-flex justify-content-between">
                    <label for="login-password" class="form-label fs-7 fw-semibold text-secondary-theme">Password</label>
                    <a href="#" class="fs-7 text-primary-theme fw-medium" id="forgot-password-link">Forgot Password?</a>
                  </div>
                  <div class="input-group">
                    <span class="input-group-text border-theme bg-white text-secondary-theme" id="password-addon">
                      <i class="fa-solid fa-lock"></i>
                    </span>
                    <input type="password" id="login-password" class="form-control form-input-custom" placeholder="••••••••" value="password123" required aria-describedby="password-addon">
                  </div>
                </div>

                <!-- Remember Me -->
                <div class="d-flex align-items-center justify-content-between mb-4">
                  <div class="form-check">
                    <input type="checkbox" class="form-check-input border-theme" id="login-remember" checked>
                    <label class="form-check-label fs-7 text-secondary-theme" for="login-remember">Remember me</label>
                  </div>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="btn btn-primary-custom w-100 py-2.5 mb-3 shadow-sm" id="login-submit-btn">
                  Log In <i class="fa-solid fa-arrow-right-to-bracket ms-1"></i>
                </button>
              </form>

              <!-- Divider -->
              <div class="d-flex align-items-center my-3" id="social-divider">
                <hr class="flex-grow-1 border-theme">
                <span class="px-2 fs-8 text-secondary-theme fw-semibold">OR CONTINUE WITH</span>
                <hr class="flex-grow-1 border-theme">
              </div>

              <!-- Social Logins -->
              <div class="d-flex flex-column gap-2 mb-4">
                <button type="button" class="btn btn-secondary-custom social-login-google w-100 d-flex align-items-center justify-content-center gap-2 py-2" id="google-login-btn">
                  <i class="fa-brands fa-google text-danger fs-6"></i> Google
                </button>
                <button type="button" class="btn btn-secondary-custom social-login-apple w-100 d-flex align-items-center justify-content-center gap-2 py-2" id="apple-login-btn">
                  <i class="fa-brands fa-apple text-dark fs-6"></i> Apple
                </button>
              </div>

              <!-- Signup Link -->
              <div class="text-center mt-2">
                <p class="fs-7 text-secondary-theme mb-0">Don't have an account? <a href="register.html" class="text-primary-theme fw-semibold" id="signup-now-link">Sign Up Now</a></p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- Bootstrap 5 Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JavaScript Shared Core -->
    <script type="module" src="/js/script.js"></script>
    <!-- Custom JavaScript Authentication Handling -->
    <script type="module" src="/js/login.js"></script>
  </body>
</html>
