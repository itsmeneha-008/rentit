<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RentIt – Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/responsive.css">
  </head>
  <body class="bg-light">
    <!-- Loading Screen -->
    <div id="loading-screen">
      <div class="spinner-custom mb-3"></div>
      <h5 class="fw-semibold text-secondary-theme">Creating account...</h5>
    </div>

    <!-- Main Container -->
    <main class="d-flex align-items-center justify-content-center min-vh-100 py-5">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-md-6 col-lg-5">
            <div class="card card-custom shadow-soft-lg p-4">
              <!-- Title -->
              <div class="text-center mb-4">
                <a href="index.html" class="logo-brand d-inline-flex mb-2" id="register-logo-link">
                  <i class="fa-solid fa-arrows-spin text-primary-theme"></i> Rent<span>It</span>
                </a>
                <h4 class="fw-bold text-primary-dark font-poppins">Join RentIt</h4>
                <p class="text-secondary-theme fs-7">Connect with local owners and rent instantly</p>
              </div>

              <!-- Register Form -->
              <form id="register-form">
                <!-- Avatar Upload Slot -->
                <div class="text-center mb-4">
                  <div class="position-relative d-inline-block">
                    <img id="register-avatar-preview" src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=150&q=80" class="rounded-circle object-fit-cover shadow-sm border border-2 border-primary" style="width: 80px; height: 80px;" alt="Avatar Preview">
                    <label for="register-avatar-file" class="position-absolute bottom-0 end-0 bg-primary-theme text-white rounded-circle d-flex align-items-center justify-content-center cursor-pointer shadow" style="width: 26px; height: 26px;">
                      <i class="fa-solid fa-camera fs-8"></i>
                    </label>
                    <input type="file" id="register-avatar-file" accept="image/*" class="d-none">
                  </div>
                  <div class="fs-8 text-secondary-theme mt-1 fw-medium">Upload Profile Photo</div>
                </div>

                <!-- Full Name -->
                <div class="mb-3">
                  <label for="register-name" class="form-label fs-7 fw-semibold text-secondary-theme">Full Name</label>
                  <input type="text" id="register-name" class="form-control form-input-custom" placeholder="Alexander Pierce" required>
                </div>

                <!-- Phone Number -->
                <div class="mb-3">
                  <label for="register-phone" class="form-label fs-7 fw-semibold text-secondary-theme">Phone Number</label>
                  <input type="tel" id="register-phone" class="form-control form-input-custom" placeholder="+1 (415) 555-0133" required>
                </div>

                <!-- Email -->
                <div class="mb-3">
                  <label for="register-email" class="form-label fs-7 fw-semibold text-secondary-theme">Email Address</label>
                  <input type="email" id="register-email" class="form-control form-input-custom" placeholder="alex.p@google.com" required>
                </div>

                <!-- Password Row -->
                <div class="row">
                  <div class="col-sm-6 mb-3">
                    <label for="register-password" class="form-label fs-7 fw-semibold text-secondary-theme">Password</label>
                    <input type="password" id="register-password" class="form-control form-input-custom" placeholder="••••••••" required>
                  </div>
                  <div class="col-sm-6 mb-3">
                    <label for="register-confirm-password" class="form-label fs-7 fw-semibold text-secondary-theme">Confirm Password</label>
                    <input type="password" id="register-confirm-password" class="form-control form-input-custom" placeholder="••••••••" required>
                  </div>
                </div>

                <!-- Create Button -->
                <button type="submit" class="btn btn-primary-custom w-100 py-2.5 mt-2 mb-3 shadow-sm" id="register-submit-btn">
                  Create Account <i class="fa-solid fa-user-plus ms-1"></i>
                </button>
              </form>

              <!-- Divider -->
              <div class="d-flex align-items-center my-3" id="social-divider-reg">
                <hr class="flex-grow-1 border-theme">
                <span class="px-2 fs-8 text-secondary-theme fw-semibold">OR REGISTER WITH</span>
                <hr class="flex-grow-1 border-theme">
              </div>

              <!-- Social Registrations -->
              <div class="d-flex flex-column gap-2 mb-4">
                <button type="button" class="btn btn-secondary-custom social-login-google w-100 d-flex align-items-center justify-content-center gap-2 py-2" id="google-reg-btn">
                  <i class="fa-brands fa-google text-danger fs-6"></i> Register with Google
                </button>
              </div>

              <!-- Back to Login -->
              <div class="text-center mt-2">
                <p class="fs-7 text-secondary-theme mb-0">Already have an account? <a href="login.html" class="text-primary-theme fw-semibold" id="signin-link">Sign In</a></p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- Bootstrap 5 Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JavaScript Shared Core -->
    <script type="module" src="/js/script.js"></script>
    <!-- Custom JavaScript Authentication Handling -->
    <script type="module" src="/js/login.js"></script>
  </body>
</html>
