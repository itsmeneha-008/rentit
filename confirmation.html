<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RentIt – Order Confirmed</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/responsive.css">
  </head>
  <body class="bg-light">
    <!-- Loading Screen -->
    <div id="loading-screen">
      <div class="spinner-custom mb-3"></div>
      <h5 class="fw-semibold text-secondary-theme">Opening receipt voucher...</h5>
    </div>

    <!-- Main Wrapper -->
    <main class="d-flex align-items-center justify-content-center min-vh-100 py-5" id="confirmation-page-container">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-md-6 col-lg-5">
            <div class="card card-custom p-4 border-0 shadow-soft-lg text-center">
              
              <!-- Green Success Check Animated Icon -->
              <div class="d-inline-flex align-items-center justify-content-center bg-accent-light text-accent-theme rounded-circle p-4 mb-4 mx-auto animate-bounce" style="width: 84px; height: 84px;">
                <i class="fa-solid fa-circle-check fs-1"></i>
              </div>

              <!-- Headers -->
              <h3 class="fw-bold text-dark font-poppins mb-1">Booking Confirmed!</h3>
              <p class="text-secondary-theme fs-7 mb-4">Your rental agreement has been registered and verified.</p>

              <!-- QR CODE & MOCK SCANNER -->
              <div class="bg-light p-3 rounded-4 border border-theme mb-4 d-inline-block mx-auto" style="max-width: 250px;">
                <!-- Simulated stylish QR canvas code -->
                <div class="bg-white border border-secondary border-opacity-10 p-2.5 rounded-3 d-inline-block shadow-sm">
                  <div class="d-flex flex-column gap-1 justify-content-center align-items-center" style="width: 140px; height: 140px; background: linear-gradient(45deg, #eee 25%, transparent 25%, transparent 75%, #eee 75%), linear-gradient(45deg, #eee 25%, white 25%, white 75%, #eee 75%); background-size: 20px 20px;">
                    <i class="fa-solid fa-qrcode text-dark" style="font-size: 5rem;"></i>
                  </div>
                </div>
                <div class="fs-8 text-secondary-theme mt-2 font-mono fw-bold" id="conf-qr-value">RENTIT-BK-VERIFIED</div>
                <p class="fs-8 text-secondary-theme mb-0 mt-1">Show this QR to the host on pickup</p>
              </div>

              <!-- Transaction parameters details table -->
              <div class="card border border-theme bg-white p-3 rounded-4 text-start mb-4">
                <div class="d-flex justify-content-between mb-2">
                  <span class="fs-8 text-secondary-theme fw-semibold">Booking Reference</span>
                  <span class="fs-8 font-mono fw-bold text-dark" id="conf-id">BK-000000</span>
                </div>
                <div class="d-flex justify-content-between mb-2">
                  <span class="fs-8 text-secondary-theme fw-semibold">Selected Listing</span>
                  <span class="fs-8 fw-semibold text-dark text-truncate" style="max-width: 160px;" id="conf-title"></span>
                </div>
                <div class="d-flex justify-content-between mb-2">
                  <span class="fs-8 text-secondary-theme fw-semibold">Leasing Dates</span>
                  <span class="fs-8 fw-semibold text-dark" id="conf-dates"></span>
                </div>
                <div class="d-flex justify-content-between pt-2 border-top border-light">
                  <span class="fs-7 text-dark fw-bold">Total Charged</span>
                  <span class="fs-7 fw-bold text-primary-theme font-mono" id="conf-total">$0.00</span>
                </div>
              </div>

              <!-- Action buttons -->
              <div class="d-flex flex-column gap-2">
                <button type="button" class="btn btn-primary-custom py-2.5 w-100 shadow-sm d-flex align-items-center justify-content-center gap-1.5" id="download-receipt-btn">
                  <i class="fa-solid fa-file-arrow-down"></i> Download Receipt Voucher
                </button>
                <a href="home.html" class="btn btn-secondary-custom py-2.5 w-100" id="back-home-btn">
                  Back to Marketplace Home
                </a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- Bootstrap 5 Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JavaScript Shared Core -->
    <script type="module" src="/js/script.js"></script>
    <!-- Custom JavaScript Checkout Logic -->
    <script type="module" src="/js/booking.js"></script>
  </body>
</html>
