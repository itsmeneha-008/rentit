<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RentIt – Categories</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/responsive.css">
  </head>
  <body>
    <!-- Loading Screen -->
    <div id="loading-screen">
      <div class="spinner-custom mb-3"></div>
      <h5 class="fw-semibold text-secondary-theme">Opening rental directories...</h5>
    </div>

    <!-- Header Navigation -->
    <nav class="navbar navbar-custom">
      <div class="container-fluid max-width-container d-flex justify-content-between align-items-center">
        <a href="home.html" class="logo-brand" id="cat-brand-logo">
          <i class="fa-solid fa-arrows-spin text-primary-theme"></i> Rent<span>It</span>
        </a>
        <div class="d-flex align-items-center gap-2">
          <button class="btn dark-mode-toggle p-2 fs-5" id="cat-mode-toggle" aria-label="Toggle dark mode">
            <i class="fa-solid fa-moon"></i>
          </button>
          <a href="profile.html">
            <img src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?auto=format&fit=crop&w=150&q=80" alt="Profile" class="nav-avatar-img">
          </a>
        </div>
      </div>
    </nav>

    <!-- Main Wrapper -->
    <main class="main-wrapper py-4">
      <div class="container mb-3">
        <div class="mb-4">
          <h4 class="fw-bold mb-1 font-poppins text-primary-dark">Rental Categories</h4>
          <p class="text-secondary-theme fs-7 mb-0">Select a category to view high-quality available items in Seattle</p>
        </div>

        <!-- 12 Major Categories Grid -->
        <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4" id="categories-deck">
          <!-- 1. Cameras -->
          <div class="col">
            <a href="search.html?category=Cameras" class="card card-custom h-100 border-0 shadow-sm" id="cat-card-cameras">
              <div class="card-img-wrapper" style="aspect-ratio: 16/10;">
                <img src="https://images.unsplash.com/photo-1516035069371-29a1b244cc32?auto=format&fit=crop&w=600&q=80" alt="Cameras" loading="lazy">
              </div>
              <div class="card-body p-3 d-flex justify-content-between align-items-center">
                <span class="fw-bold font-poppins text-dark"><i class="fa-solid fa-camera text-primary-theme me-2"></i> Cameras</span>
                <i class="fa-solid fa-chevron-right text-secondary-theme fs-8"></i>
              </div>
            </a>
          </div>

          <!-- 2. Cars -->
          <div class="col">
            <a href="search.html?category=Cars" class="card card-custom h-100 border-0 shadow-sm" id="cat-card-cars">
              <div class="card-img-wrapper" style="aspect-ratio: 16/10;">
                <img src="https://images.unsplash.com/photo-1563720223185-11003d516935?auto=format&fit=crop&w=600&q=80" alt="Cars" loading="lazy">
              </div>
              <div class="card-body p-3 d-flex justify-content-between align-items-center">
                <span class="fw-bold font-poppins text-dark"><i class="fa-solid fa-car text-primary-theme me-2"></i> Cars</span>
                <i class="fa-solid fa-chevron-right text-secondary-theme fs-8"></i>
              </div>
            </a>
          </div>

          <!-- 3. Bikes -->
          <div class="col">
            <a href="search.html?category=Bikes" class="card card-custom h-100 border-0 shadow-sm" id="cat-card-bikes">
              <div class="card-img-wrapper" style="aspect-ratio: 16/10;">
                <img src="https://images.unsplash.com/photo-1485965120184-e220f721d03e?auto=format&fit=crop&w=600&q=80" alt="Bikes" loading="lazy">
              </div>
              <div class="card-body p-3 d-flex justify-content-between align-items-center">
                <span class="fw-bold font-poppins text-dark"><i class="fa-solid fa-bicycle text-primary-theme me-2"></i> Bikes</span>
                <i class="fa-solid fa-chevron-right text-secondary-theme fs-8"></i>
              </div>
            </a>
          </div>

          <!-- 4. Houses -->
          <div class="col">
            <a href="search.html?category=Houses" class="card card-custom h-100 border-0 shadow-sm" id="cat-card-houses">
              <div class="card-img-wrapper" style="aspect-ratio: 16/10;">
                <img src="https://images.unsplash.com/photo-1499793983690-e29da59ef1c2?auto=format&fit=crop&w=600&q=80" alt="Houses" loading="lazy">
              </div>
              <div class="card-body p-3 d-flex justify-content-between align-items-center">
                <span class="fw-bold font-poppins text-dark"><i class="fa-solid fa-house-chimney text-primary-theme me-2"></i> Houses</span>
                <i class="fa-solid fa-chevron-right text-secondary-theme fs-8"></i>
              </div>
            </a>
          </div>

          <!-- 5. Apartments -->
          <div class="col">
            <a href="search.html?category=Apartments" class="card card-custom h-100 border-0 shadow-sm" id="cat-card-apartments">
              <div class="card-img-wrapper" style="aspect-ratio: 16/10;">
                <img src="https://images.unsplash.com/photo-1522708323590-d24dbb6b0267?auto=format&fit=crop&w=600&q=80" alt="Apartments" loading="lazy">
              </div>
              <div class="card-body p-3 d-flex justify-content-between align-items-center">
                <span class="fw-bold font-poppins text-dark"><i class="fa-solid fa-building text-primary-theme me-2"></i> Apartments</span>
                <i class="fa-solid fa-chevron-right text-secondary-theme fs-8"></i>
              </div>
            </a>
          </div>

          <!-- 6. Electronics -->
          <div class="col">
            <a href="search.html?category=Electronics" class="card card-custom h-100 border-0 shadow-sm" id="cat-card-electronics">
              <div class="card-img-wrapper" style="aspect-ratio: 16/10;">
                <img src="https://images.unsplash.com/photo-1517336714731-489689fd1ca8?auto=format&fit=crop&w=600&q=80" alt="Electronics" loading="lazy">
              </div>
              <div class="card-body p-3 d-flex justify-content-between align-items-center">
                <span class="fw-bold font-poppins text-dark"><i class="fa-solid fa-mobile-screen text-primary-theme me-2"></i> Electronics</span>
                <i class="fa-solid fa-chevron-right text-secondary-theme fs-8"></i>
              </div>
            </a>
          </div>

          <!-- 7. Furniture -->
          <div class="col">
            <a href="search.html?category=Furniture" class="card card-custom h-100 border-0 shadow-sm" id="cat-card-furniture">
              <div class="card-img-wrapper" style="aspect-ratio: 16/10;">
                <img src="https://images.unsplash.com/photo-1567538096630-e0c55bd6374c?auto=format&fit=crop&w=600&q=80" alt="Furniture" loading="lazy">
              </div>
              <div class="card-body p-3 d-flex justify-content-between align-items-center">
                <span class="fw-bold font-poppins text-dark"><i class="fa-solid fa-chair text-primary-theme me-2"></i> Furniture</span>
                <i class="fa-solid fa-chevron-right text-secondary-theme fs-8"></i>
              </div>
            </a>
          </div>

          <!-- 8. Construction Equipment -->
          <div class="col">
            <a href="search.html?category=Construction+Equipment" class="card card-custom h-100 border-0 shadow-sm" id="cat-card-construction">
              <div class="card-img-wrapper" style="aspect-ratio: 16/10;">
                <img src="https://images.unsplash.com/photo-1579684389782-64d84b5e901a?auto=format&fit=crop&w=600&q=80" alt="Construction Equipment" loading="lazy">
              </div>
              <div class="card-body p-3 d-flex justify-content-between align-items-center">
                <span class="fw-bold font-poppins text-dark"><i class="fa-solid fa-truck-monster text-primary-theme me-2"></i> Construction</span>
                <i class="fa-solid fa-chevron-right text-secondary-theme fs-8"></i>
              </div>
            </a>
          </div>

          <!-- 9. Power Tools -->
          <div class="col">
            <a href="search.html?category=Power+Tools" class="card card-custom h-100 border-0 shadow-sm" id="cat-card-tools">
              <div class="card-img-wrapper" style="aspect-ratio: 16/10;">
                <img src="https://images.unsplash.com/photo-1504148455328-c376907d081c?auto=format&fit=crop&w=600&q=80" alt="Power Tools" loading="lazy">
              </div>
              <div class="card-body p-3 d-flex justify-content-between align-items-center">
                <span class="fw-bold font-poppins text-dark"><i class="fa-solid fa-screwdriver-wrench text-primary-theme me-2"></i> Power Tools</span>
                <i class="fa-solid fa-chevron-right text-secondary-theme fs-8"></i>
              </div>
            </a>
          </div>

          <!-- 10. Musical Instruments -->
          <div class="col">
            <a href="search.html?category=Musical+Instruments" class="card card-custom h-100 border-0 shadow-sm" id="cat-card-music">
              <div class="card-img-wrapper" style="aspect-ratio: 16/10;">
                <img src="https://images.unsplash.com/photo-1550985616-10810253b84d?auto=format&fit=crop&w=600&q=80" alt="Musical Instruments" loading="lazy">
              </div>
              <div class="card-body p-3 d-flex justify-content-between align-items-center">
                <span class="fw-bold font-poppins text-dark"><i class="fa-solid fa-guitar text-primary-theme me-2"></i> Instruments</span>
                <i class="fa-solid fa-chevron-right text-secondary-theme fs-8"></i>
              </div>
            </a>
          </div>

          <!-- 11. Drones -->
          <div class="col">
            <a href="search.html?category=Drones" class="card card-custom h-100 border-0 shadow-sm" id="cat-card-drones">
              <div class="card-img-wrapper" style="aspect-ratio: 16/10;">
                <img src="https://images.unsplash.com/photo-1508614589041-895b88991e3e?auto=format&fit=crop&w=600&q=80" alt="Drones" loading="lazy">
              </div>
              <div class="card-body p-3 d-flex justify-content-between align-items-center">
                <span class="fw-bold font-poppins text-dark"><i class="fa-solid fa-helicopter text-primary-theme me-2"></i> Drones</span>
                <i class="fa-solid fa-chevron-right text-secondary-theme fs-8"></i>
              </div>
            </a>
          </div>

          <!-- 12. Camping Equipment -->
          <div class="col">
            <a href="search.html?category=Camping+Equipment" class="card card-custom h-100 border-0 shadow-sm" id="cat-card-camping">
              <div class="card-img-wrapper" style="aspect-ratio: 16/10;">
                <img src="https://images.unsplash.com/photo-1504280390367-361c6d9f38f4?auto=format&fit=crop&w=600&q=80" alt="Camping Equipment" loading="lazy">
              </div>
              <div class="card-body p-3 d-flex justify-content-between align-items-center">
                <span class="fw-bold font-poppins text-dark"><i class="fa-solid fa-tent text-primary-theme me-2"></i> Camping Gear</span>
                <i class="fa-solid fa-chevron-right text-secondary-theme fs-8"></i>
              </div>
            </a>
          </div>
        </div>
      </div>
    </main>

    <!-- Bottom Navigation Rail -->
    <nav class="bottom-nav">
      <a href="home.html" class="bottom-nav-item" id="bnav-home">
        <i class="fa-solid fa-house"></i>
        <span>Home</span>
      </a>
      <a href="categories.html" class="bottom-nav-item active" id="bnav-categories">
        <i class="fa-solid fa-compass"></i>
        <span>Categories</span>
      </a>
      <a href="wishlist.html" class="bottom-nav-item" id="bnav-wishlist">
        <i class="fa-solid fa-heart"></i>
        <span class="badge-counter d-none wishlist-badge">0</span>
        <span>Wishlist</span>
      </a>
      <a href="profile.html?tab=bookings" class="bottom-nav-item" id="bnav-bookings">
        <i class="fa-solid fa-calendar-check"></i>
        <span class="badge-counter d-none bookings-badge">0</span>
        <span>Bookings</span>
      </a>
      <a href="profile.html" class="bottom-nav-item" id="bnav-profile">
        <i class="fa-solid fa-user"></i>
        <span>Profile</span>
      </a>
    </nav>

    <!-- Bootstrap 5 Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JavaScript Shared Core -->
    <script type="module" src="/js/script.js"></script>
  </body>
</html>
